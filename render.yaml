version: "1"
services:
  - type: web
    name: soc-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn api.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soc-postgres
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false # Ensure user sets this in Render UI

databases:
  - name: soc-postgres
    databaseName: soc_db
    user: soc_user
